resources:
  jobs:
    retail_maintenance:
      name: "RetailIQ Maintenance [${bundle.target}]"
      description: "Nightly OPTIMIZE + ANALYZE on Gold tables — runs off the critical pipeline path"

      environments:
        - environment_key: serverless
          spec:
            client: "2"

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"   # 02:00 UTC daily
        timezone_id: "UTC"
        pause_status: UNPAUSED

      tasks:
        - task_key: optimize_gold
          description: "OPTIMIZE and ANALYZE all Gold tables for query performance"
          environment_key: serverless
          max_retries: 3
          min_retry_interval_millis: 60000
          timeout_seconds: 1800
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/07_maintenance
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

      email_notifications:
        on_failure:
          - p.amani@gmail.com
        no_alert_for_skipped_runs: true

      queue:
        enabled: true
